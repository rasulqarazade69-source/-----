<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Football</title>
<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #4caf50;
        font-family: Arial, sans-serif;
    }
    #field {
        position: relative;
        width: 600px;
        height: 400px;
        background: #3e8e41;
        border: 5px solid #fff;
        border-radius: 10px;
        overflow: hidden;
    }
    #player {
        position: absolute;
        width: 40px;
        height: 40px;
        background: blue;
        border-radius: 50%;
        bottom: 50px;
        left: 280px;
    }
    #ball {
        position: absolute;
        width: 30px;
        height: 30px;
        background: #fff;
        border-radius: 50%;
        left: 285px;
        top: 180px;
    }
    #goal {
        position: absolute;
        width: 100px;
        height: 10px;
        background: yellow;
        top: 0;
        left: 250px;
    }
    #score {
        position: absolute;
        top: -40px;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 24px;
        color: white;
        text-shadow: 0 0 5px #000;
    }
</style>
</head>
<body>
<div id="field">
    <div id="score">Score: 0</div>
    <div id="goal"></div>
    <div id="player"></div>
    <div id="ball"></div>
</div>
<script>
const field = document.getElementById('field');
const player = document.getElementById('player');
const ball = document.getElementById('ball');
const scoreEl = document.getElementById('score');

let playerPos = { x: 280, y: 350 };
let ballPos = { x: 285, y: 180 };
let score = 0;

function movePlayer(dx, dy) {
    playerPos.x = Math.max(0, Math.min(560, playerPos.x + dx));
    playerPos.y = Math.max(0, Math.min(360, playerPos.y + dy));
    player.style.left = playerPos.x + 'px';
    player.style.top = playerPos.y + 'px';

    // Если игрок касается мяча, мяч двигается
    const distX = (playerPos.x+20) - (ballPos.x+15);
    const distY = (playerPos.y+20) - (ballPos.y+15);
    const distance = Math.sqrt(distX*distX + distY*distY);
    if(distance < 35){
        ballPos.x += dx;
        ballPos.y += dy;
        ballPos.x = Math.max(0, Math.min(570, ballPos.x));
        ballPos.y = Math.max(0, Math.min(370, ballPos.y));
        ball.style.left = ballPos.x + 'px';
        ball.style.top = ballPos.y + 'px';

        // Проверка гола
        if(ballPos.y <= 10 && ballPos.x > 250 && ballPos.x < 350){
            score++;
            scoreEl.textContent = 'Score: ' + score;
            ballPos.x = 285;
            ballPos.y = 180;
            ball.style.left = ballPos.x + 'px';
            ball.style.top = ballPos.y + 'px';
        }
    }
}

document.addEventListener('keydown', e => {
    switch(e.key){
        case 'ArrowUp': movePlayer(0,-10); break;
        case 'ArrowDown': movePlayer(0,10); break;
        case 'ArrowLeft': movePlayer(-10,0); break;
        case 'ArrowRight': movePlayer(10,0); break;
    }
});
</script>
</body>
</html>
